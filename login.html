<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome to MegaBlog Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #007bff;
            --primary-grad: linear-gradient(135deg, #007bff 0%, #0056b3 100%);
            --bg-grad: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            --text-dark: #1e293b;
            --text-light: #64748b;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background: var(--bg-grad);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .auth-container {
            background: #ffffff;
            width: 100%;
            max-width: 450px;
            padding: 40px 35px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.8);
        }

        .brand-logo {
            text-align: center;
            font-size: 2rem;
            font-weight: 700;
            color: var(--text-dark);
            margin-bottom: 10px;
            cursor: pointer;
        }

        .brand-logo span {
            color: var(--primary);
        }

        .auth-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .auth-header h2 {
            font-size: 1.5rem;
            color: var(--text-dark);
            font-weight: 600;
            margin-bottom: 6px;
        }

        .auth-header p {
            color: var(--text-light);
            font-size: 0.9rem;
        }

        .form-group {
            margin-bottom: 20px;
            position: relative;
        }

        .form-group label {
            display: block;
            font-size: 0.85rem;
            font-weight: 500;
            color: var(--text-dark);
            margin-bottom: 6px;
        }

        .form-group input {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #cbd5e1;
            border-radius: 10px;
            font-size: 0.95rem;
            color: var(--text-dark);
            transition: all 0.3s ease;
            background: #f8fafc;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--primary);
            background: #ffffff;
            box-shadow: 0 0 0 4px rgba(0, 123, 255, 0.15);
        }

        .btn-submit {
            width: 100%;
            padding: 14px;
            background: var(--primary-grad);
            border: none;
            border-radius: 10px;
            color: white;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            margin-top: 10px;
            box-shadow: 0 4px 12px rgba(0, 123, 255, 0.2);
        }

        .btn-submit:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 15px rgba(0, 123, 255, 0.3);
        }

        .btn-submit:active {
            transform: translateY(1px);
        }

        .divider {
            display: flex;
            align-items: center;
            text-align: center;
            color: var(--text-light);
            font-size: 0.8rem;
            margin: 25px 0;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .divider::before, .divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid #e2e8f0;
        }

        .divider:not(:empty)::before { margin-right: .5em; }
        .divider:not(:empty)::after { margin-left: .5em; }

        .social-btn-container {
            display: flex;
            gap: 12px;
            margin-bottom: 25px;
        }

        .social-btn {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            padding: 10px;
            border: 1px solid #cbd5e1;
            border-radius: 10px;
            background: white;
            font-size: 0.85rem;
            font-weight: 500;
            color: var(--text-dark);
            cursor: pointer;
            transition: background 0.2s ease;
        }

        .social-btn:hover {
            background: #f8fafc;
            border-color: #94a3b8;
        }

        .toggle-text {
            text-align: center;
            font-size: 0.9rem;
            color: var(--text-light);
        }

        .toggle-text a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
        }

        .toggle-text a:hover {
            text-decoration: underline;
        }

        
        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>

    <div class="auth-container">
        <div class="brand-logo">Mega<span>Blog</span></div>

        <div id="loginSection">
            <div class="auth-header">
                <h2>Welcome Back</h2>
                <p>Enter your details to access your premium feed</p>
            </div>

            <form id="loginForm" onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label for="loginEmail">Email Address</label>
                    <input type="email" id="loginEmail" placeholder="name@example.com" required>
                </div>
                <div class="form-group">
                    <label for="loginPassword">Password</label>
                    <input type="password" id="loginPassword" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn-submit">Sign In</button>
            </form>

            <div class="divider">Or continue with</div>

            <div class="social-btn-container">
                <button class="social-btn" onclick="alert('Google Auth integration coming in v2.0!')">
                    🌐 Google
                </button>
                <button class="social-btn" onclick="alert('GitHub Auth integration coming in v2.0!')">
                    🐙 GitHub
                </button>
            </div>

            <p class="toggle-text">Don't have an account? <a href="#" onclick="switchCard('signup')">Create one now</a></p>
        </div>

        <div id="signupSection" class="hidden">
            <div class="auth-header">
                <h2>Create Account</h2>
                <p>Join Ravindra & Shivam's elite reading club</p>
            </div>

            <form id="signupForm" onsubmit="handleSignup(event)">
                <div class="form-group">
                    <label for="signupName">Full Name</label>
                    <input type="text" id="signupName" placeholder="John Doe" required>
                </div>
                <div class="form-group">
                    <label for="signupEmail">Email Address</label>
                    <input type="email" id="signupEmail" placeholder="name@example.com" required>
                </div>
                <div class="form-group">
                    <label for="signupPassword">Password</label>
                    <input type="password" id="signupPassword" placeholder="Minimum 6 characters" minlength="6" required>
                </div>
                <button type="submit" class="btn-submit">Get Started</button>
            </form>

            <div class="divider">Or register with</div>

            <div class="social-btn-container">
                <button class="social-btn" onclick="alert('Google Auth integration coming in v2.0!')">
                    🌐 Google
                </button>
            </div>

            <p class="toggle-text">Already registered? <a href="#" onclick="switchCard('login')">Sign in here</a></p>
        </div>
    </div>

    <script>
        
        function switchCard(view) {
            const loginCard = document.getElementById('loginSection');
            const signupCard = document.getElementById('signupSection');
            
            if (view === 'signup') {
                loginCard.classList.add('hidden');
                signupCard.classList.remove('hidden');
            } else {
                signupCard.classList.add('hidden');
                loginCard.classList.remove('hidden');
            }
        }

        function handleSignup(e) {
            e.preventDefault();
            const name = document.getElementById('signupName').value;
            const email = document.getElementById('signupEmail').value;
            
            if(name && email) {
                
                localStorage.setItem("currentUser", name);
                alert(`🎉 Welcome ${name}! Account Created Successfully. Now signing you in...`);
                
                
                window.location.href = "index.html"; 
            }
        }


        function handleLogin(e) {
            e.preventDefault();
            const email = document.getElementById('loginEmail').value;
            
            
            let username = email.split('@')[0];
            username = username.charAt(0).toUpperCase() + username.slice(1);
            
            
            localStorage.setItem("currentUser", username);
            

            window.location.href = "index.html"; 
        }
    </script>
</body>
</html>
